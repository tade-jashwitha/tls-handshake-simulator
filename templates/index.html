<!doctype html>
<html>
  <head>
    <title>TLS Handshake Simulator</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <h1 class="title">🔐 TLS Handshake Simulator</h1>

    <div class="network">
      <div class="node client">
        <h2>Client</h2>
        <p>🌐 Browser</p>
      </div>

      <div class="connection">
        <div id="packet"></div>
      </div>

      <div class="node server">
        <h2>Server</h2>
        <p>🔒 Secure Website</p>
      </div>
    </div>

    <div class="controls">
      <button onclick="startSimulation()">▶ Start</button>
      <button onclick="resetSimulation()">🔄 Reset</button>
    </div>

    <div class="info-panel">
      <h3>🧠 Step Explanation</h3>
      <p id="info">Click "Start" to begin the TLS handshake simulation.</p>
    </div>

    <div class="timeline">
      <h3>📡 TLS Handshake Progress</h3>
      <ul id="steps"></ul>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
