<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TLS Handshake Simulator</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              surface: "#09090b", // zinc-950
              background: "#000000", // black
              panel: "#020617", // slate-950
            },
            fontFamily: {
              sans: ["Inter", "system-ui", "sans-serif"],
              mono: ["JetBrains Mono", "Fira Code", "monospace"],
            },
          },
        },
      };
    </script>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>

  <body
    class="bg-background text-gray-300 font-sans min-h-screen selection:bg-purple-900/50"
  >
    <nav
      class="w-full border-b border-white/5 bg-black/80 backdrop-blur-xl sticky top-0 z-50"
    >
      <div
        class="max-w-7xl mx-auto px-8 py-4 flex items-center justify-between"
      >
        <div class="flex items-center gap-3">
          <div
            class="w-9 h-9 rounded-xl bg-gradient-to-br from-violet-600 to-fuchsia-500 flex items-center justify-center shadow-lg shadow-fuchsia-500/20"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-5 h-5 text-white"
              viewBox="0 0 20 20"
              fill="currentColor"
            >
              <path
                fill-rule="evenodd"
                d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"
                clip-rule="evenodd"
              />
            </svg>
          </div>
          <div>
            <h1 class="text-lg font-semibold text-white tracking-tight">
              TLS Handshake
            </h1>
            <p class="text-[11px] text-gray-400 -mt-0.5">
              Interactive Simulator
            </p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <span
            id="status-badge"
            class="px-3 py-1 text-xs font-medium rounded-full bg-surface text-gray-400 transition-all duration-500 border border-white/10 shadow-sm"
            >Idle</span
          >
        </div>
      </div>
    </nav>

    <main class="max-w-7xl mx-auto px-8 py-10">
      <div class="mb-10">
        <div
          class="w-full h-1.5 bg-white/5 rounded-full overflow-hidden shadow-inner"
        >
          <div
            id="progress-bar"
            class="h-full bg-gradient-to-r from-cyan-400 via-blue-500 to-fuchsia-500 rounded-full transition-all duration-700 ease-out shadow-[0_0_15px_rgba(168,85,247,0.5)]"
            style="width: 0%"
          ></div>
        </div>
      </div>

      <section class="mb-14">
        <div
          class="flex items-center justify-center gap-0 w-full max-w-3xl mx-auto"
        >
          <div
            id="client-node"
            class="node-card group flex-shrink-0 w-52 p-6 bg-surface rounded-2xl border border-cyan-900/30 shadow-lg transition-all duration-400 relative overflow-hidden backdrop-blur-sm"
          >
            <div
              class="client-glow absolute inset-0 opacity-0 transition-opacity duration-500 rounded-2xl"
            ></div>
            <div class="relative z-10 flex flex-col items-center">
              <div
                class="w-14 h-14 rounded-2xl bg-black border border-cyan-900/50 flex items-center justify-center mb-4 group-hover:shadow-[0_0_20px_rgba(34,211,238,0.3)] transition-shadow"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-7 h-7 text-cyan-400 drop-shadow-[0_0_8px_rgba(34,211,238,0.5)]"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  stroke-width="1.5"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
                  />
                </svg>
              </div>
              <h2 class="text-base font-semibold text-white">Client</h2>
              <p
                class="text-[11px] text-cyan-400 mt-0.5 tracking-wide uppercase"
              >
                Web Browser
              </p>
            </div>
          </div>

          <div class="flex-grow relative mx-2 flex flex-col items-center">
            <div
              id="direction-label"
              class="absolute -top-8 left-1/2 -translate-x-1/2 px-3 py-1 bg-surface border border-white/10 rounded-lg text-[10px] font-medium text-gray-300 whitespace-nowrap opacity-0 transition-all duration-500 shadow-lg z-10 flex items-center gap-1.5 backdrop-blur-sm"
            ></div>
            <div
              class="wire w-full h-[3px] bg-white/5 rounded-full relative overflow-visible shadow-inner"
            >
              <div
                class="wire-active-bg absolute inset-0 rounded-full transition-all duration-500"
                style="transform: scaleX(0); transform-origin: left"
              ></div>
              <div id="packet" class="packet-dot"></div>
            </div>
            <div class="flex justify-between w-full mt-2 px-1">
              <span
                id="arrow-left"
                class="text-[10px] text-gray-700 transition-colors duration-300 drop-shadow-md"
                >●</span
              >
              <span
                id="arrow-right"
                class="text-[10px] text-gray-700 transition-colors duration-300 drop-shadow-md"
                >●</span
              >
            </div>
          </div>

          <div
            id="server-node"
            class="node-card group flex-shrink-0 w-52 p-6 bg-surface rounded-2xl border border-fuchsia-900/30 shadow-lg transition-all duration-400 relative overflow-hidden backdrop-blur-sm"
          >
            <div
              class="server-glow absolute inset-0 opacity-0 transition-opacity duration-500 rounded-2xl"
            ></div>
            <div class="relative z-10 flex flex-col items-center">
              <div
                class="w-14 h-14 rounded-2xl bg-black border border-fuchsia-900/50 flex items-center justify-center mb-4 group-hover:shadow-[0_0_20px_rgba(217,70,239,0.3)] transition-shadow"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-7 h-7 text-fuchsia-500 drop-shadow-[0_0_8px_rgba(217,70,239,0.5)]"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  stroke-width="1.5"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"
                  />
                </svg>
              </div>
              <h2 class="text-base font-semibold text-white">Server</h2>
              <p
                class="text-[11px] text-fuchsia-400 mt-0.5 tracking-wide uppercase"
              >
                Secure Host
              </p>
            </div>
          </div>
        </div>
      </section>

      <section
        class="flex flex-col sm:flex-row justify-center items-center gap-4 mb-14"
      >
        <div class="flex gap-3">
          <button
            id="btn-start"
            onclick="startSimulation()"
            class="group px-7 py-2.5 rounded-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white text-sm font-medium transition-all shadow-lg shadow-indigo-600/30 hover:shadow-indigo-500/50 active:scale-[0.97] flex items-center gap-2.5 border border-white/5"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-4 h-4 group-hover:scale-110 transition-transform"
              viewBox="0 0 20 20"
              fill="currentColor"
            >
              <path
                fill-rule="evenodd"
                d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"
                clip-rule="evenodd"
              />
            </svg>
            Run Handshake
          </button>
          <button
            onclick="resetSimulation()"
            class="px-7 py-2.5 rounded-full bg-surface border border-white/10 hover:bg-white/5 text-gray-300 text-sm font-medium transition-all shadow-sm active:scale-[0.97] flex items-center gap-2"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-4 h-4"
              viewBox="0 0 20 20"
              fill="currentColor"
            >
              <path
                fill-rule="evenodd"
                d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z"
                clip-rule="evenodd"
              />
            </svg>
            Reset
          </button>
        </div>

        <div
          class="flex items-center gap-2 sm:ml-4 bg-surface px-4 py-2 rounded-full border border-white/10 shadow-sm"
        >
          <label class="relative inline-flex items-center cursor-pointer">
            <input
              type="checkbox"
              id="auto-scroll-toggle"
              class="sr-only peer"
              checked
            />
            <div
              class="w-9 h-5 bg-black border border-white/10 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[3px] after:left-[3px] after:bg-gray-500 after:rounded-full after:h-3.5 after:w-3.5 after:transition-all peer-checked:bg-fuchsia-600 peer-checked:after:bg-white"
            ></div>
            <span class="ml-3 text-sm font-medium text-gray-300"
              >Auto Scroll</span
            >
          </label>
        </div>
      </section>

      <section
        class="grid grid-cols-1 lg:grid-cols-12 gap-8"
        id="details-section"
      >
        <div class="lg:col-span-4">
          <h3
            class="text-xs font-semibold text-blue-500 mb-5 uppercase tracking-wider flex items-center gap-2 drop-shadow-md"
          >
            <span
              class="w-2 h-2 rounded-full bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,1)]"
            ></span>
            Timeline
          </h3>
          <ol
            id="steps"
            class="flex flex-col gap-2 relative before:absolute before:inset-y-0 before:left-3.5 before:w-px before:bg-white/5 before:z-0"
          ></ol>
        </div>

        <div class="lg:col-span-8 flex flex-col gap-6">
          <div
            class="p-7 bg-panel border-white/10 backdrop-blur-md rounded-2xl border shadow-xl text-left relative overflow-hidden transition-all duration-300"
          >
            <div
              class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-cyan-400 to-blue-600"
            ></div>
            <h3
              class="text-cyan-400 text-[11px] font-semibold uppercase tracking-wider mb-3 drop-shadow-md"
            >
              Explanation
            </h3>
            <p
              id="info"
              class="text-gray-200 text-[15px] leading-relaxed font-light"
            >
              Click "Run Handshake" to observe the vibrant TLS handshake
              sequence step by step.
            </p>
          </div>

          <div
            id="rsa-panel"
            class="rsa-panel-hidden bg-panel backdrop-blur-md rounded-2xl border border-fuchsia-900/30 shadow-2xl text-left relative overflow-hidden transition-all duration-300"
          >
            <div
              class="absolute top-0 right-0 w-64 h-64 bg-fuchsia-500/10 rounded-full blur-3xl pointer-events-none"
            ></div>
            <div
              class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-fuchsia-500 to-purple-600 opacity-80 shadow-[0_0_10px_rgba(217,70,239,0.8)]"
            ></div>
            <div class="p-7 relative z-10">
              <div class="flex items-center justify-between mb-2">
                <h3
                  class="text-fuchsia-400 text-[11px] font-semibold uppercase tracking-wider flex items-center gap-2 drop-shadow-md"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="w-4 h-4"
                    viewBox="0 0 20 20"
                    fill="currentColor"
                  >
                    <path
                      fill-rule="evenodd"
                      d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                      clip-rule="evenodd"
                    />
                  </svg>
                  RSA Cryptography
                </h3>
                <span
                  class="px-2 py-0.5 rounded text-[10px] uppercase font-mono bg-black border border-fuchsia-900/50 text-fuchsia-300 shadow-[0_0_10px_rgba(217,70,239,0.15)] tracking-wide"
                  >Live Data</span
                >
              </div>
              <p class="text-[12px] text-fuchsia-500/70 mb-5 font-light">
                Generated by Python
                <code class="font-mono text-fuchsia-400">cryptography</code>
                library
              </p>
              <div id="rsa-data-container" class="flex flex-col gap-4"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
